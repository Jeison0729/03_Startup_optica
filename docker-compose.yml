version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: optica_db_contenedor
    environment: 
      POSTGRES_DB: bd_optica
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "5432:5432"
    volumes: 
      - postgres_data:/var/lib/postgresql/data
      - ./Database/01_TABLAS.sql:/docker-entrypoint-initdb.d/01_tablas.sql
      - ./Database/02_INSERT.sql:/docker-entrypoint-initdb.d/02_datos.sql
    networks:
      - optica-network

  backend:
    build: ./Backend_Optica
    container_name: optica_backend_app
    restart: always
    ports:
      - "8083:8083"
    environment:
      SPRING_APPLICATION_NAME: ${SPRING_APPLICATION_NAME}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres_db:5432/bd_optica
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      
      JWT_SECRET: ${JWT_SECRET}
      
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_BUCKET: ${R2_BUCKET}
    depends_on:
      - postgres_db
    networks:
      - optica-network
  
  frontend:
    build: ./Frontend_optica
    container_name: optica_frontend_app
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - optica-network

volumes:
  postgres_data:

networks:
  optica-network:
    driver: bridge